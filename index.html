<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zampier Soccer - Em Manutenção</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Barlow',sans-serif;
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
}

.logo{
    font-size:3rem;
    font-weight:800;
    margin-bottom:15px;
}

.logo span{
    color:#22c55e;
}

.icon{
    font-size:80px;
    margin-bottom:20px;
}

h1{
    font-size:2.5rem;
    margin-bottom:15px;
}

p{
    font-size:1.1rem;
    opacity:.85;
    line-height:1.7;
    margin-bottom:30px;
}

.whatsapp{
    display:inline-block;
    padding:15px 30px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:700;
    transition:.3s;
}

.whatsapp:hover{
    transform:translateY(-3px);
}

.footer{
    margin-top:40px;
    opacity:.6;
    font-size:.9rem;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        ZAMPIER <span>SOCCER</span>
    </div>

    <div class="icon">⚙️</div>

    <h1>Estamos em manutenção</h1>

    <p>
        Nosso site está passando por melhorias para oferecer uma experiência ainda melhor.
        Em breve estaremos de volta.
    </p>

    <a class="whatsapp"
       href="https://api.whatsapp.com/send?phone=5541997267934"
       target="_blank">
        📲 Falar no WhatsApp
    </a>

    <div class="footer">
        Campo Largo • Paraná
    </div>

</div>

</body>
</html>
